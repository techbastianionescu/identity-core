services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: techbastian
      POSTGRES_PASSWORD: iDgUjy*WZ*Lf0&
      POSTGRES_DB: identitydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techbastian -d identitydb"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:

