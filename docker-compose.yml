services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - api
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: techbastian
      POSTGRES_PASSWORD: iDgUjy*WZ*Lf0&
      POSTGRES_DB: identitydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techbastian -d identitydb"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
